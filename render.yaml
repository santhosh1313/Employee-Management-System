services:
  - type: web
    name: employee-management-system
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      cd myproject
      python manage.py collectstatic --no-input
      python manage.py migrate
      python employee/create_superuser.py

    startCommand: cd myproject && gunicorn myproject.wsgi
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: WEB_CONCURRENCY
        value: 2