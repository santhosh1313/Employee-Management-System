{% extends 'employee/base.html' %}
{% block content %}

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}

    <a href="{% url 'employee_list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
